name: Django Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  test:

    runs-on: ubuntu-latest


    services:

      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


      redis:
        image: redis:7

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5



    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.13"



      - name: Install dependencies
        run: |
          pip install -r requirements.txt



      - name: Run migrations
        env:
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432

          REDIS_URL: redis://localhost:6379/1

        run: |
          python manage.py migrate



      - name: Run tests
        env:
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432

          REDIS_URL: redis://localhost:6379/1

        run: |
          python manage.py test